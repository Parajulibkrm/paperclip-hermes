services:
  paperclip-hermes:
    build: .
    container_name: paperclip-hermes
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Attach to Dokploy's overlay network so Traefik can reach this service.
    # Without this, Dokploy's auto-generated Traefik route returns 502 because
    # the container isn't on the network Traefik routes on.
    networks:
      - dokploy-network
    expose:
      # Internal-only port. Traefik connects on this port across dokploy-network.
      # We don't publish it to the host (`ports:`) because Dokploy/Swarm strips
      # host port mappings anyway when Traefik fronts the service.
      - "3100"
    environment:
      # --- Model selection (optional, default in hermes-config.yaml is openrouter/free) ---
      - HERMES_MODEL=${HERMES_MODEL:-openrouter/free}

      # --- Inference provider keys (set whichever ones your HERMES_MODEL uses) ---
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}

      # --- Browser providers (cloud) — optional, enables remote Chromium for
      #     the browser-harness skill. The image also bundles local Playwright
      #     deps if you'd rather drive a headless browser inside the container. ---
      - BROWSER_USE_API_KEY=${BROWSER_USE_API_KEY:-}
      - BROWSERBASE_API_KEY=${BROWSERBASE_API_KEY:-}
      - BROWSERBASE_PROJECT_ID=${BROWSERBASE_PROJECT_ID:-}

      # --- Paperclip web exposure ---
      # Set to your public hostname / Dokploy domain (no scheme) so the UI
      # accepts requests from it. Example: paperclip.example.com
      - IP_ADDRESS=${IP_ADDRESS:-}
      # Bind mode for paperclipai's reachability preset:
      #   loopback — 127.0.0.1 only (default; unreachable from outside the container)
      #   lan      — all interfaces (required for Traefik / Docker port-forwarding)
      #   tailnet  — Tailscale-only
      - PAPERCLIP_BIND=${PAPERCLIP_BIND:-lan}
    volumes:
      - paperclip-data:/data/paperclip
      - hermes-data:/data/hermes
      - browser-harness-cache:/opt/browser-harness/.cache
    # Explicit Traefik labels — Dokploy's Domains-tab UI sometimes doesn't
    # inject these into Compose-mode services (we observed empty labels in
    # `docker service inspect`). Setting them here guarantees Traefik routes
    # the configured ${PAPERCLIP_DOMAIN} to this service on port 3100.
    # In Swarm mode, Traefik reads labels from `deploy.labels`, not the
    # top-level `labels:` key.
    deploy:
      labels:
        - traefik.enable=true
        - traefik.docker.network=dokploy-network
        - traefik.http.routers.paperclip.rule=Host(`${PAPERCLIP_DOMAIN}`)
        - traefik.http.routers.paperclip.entrypoints=websecure
        - traefik.http.routers.paperclip.tls=true
        - traefik.http.routers.paperclip.tls.certresolver=letsencrypt
        - traefik.http.services.paperclip.loadbalancer.server.port=3100

volumes:
  paperclip-data:
  hermes-data:
  browser-harness-cache:

networks:
  # External: created by Dokploy at install time. We just join it; we don't
  # define it. If this isn't a Dokploy host, create it once with:
  #   docker network create --driver overlay --attachable dokploy-network
  dokploy-network:
    external: true
